name: Update clone badge

on:
  schedule:
    - cron: "17 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-clone-badge
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update 30-day clone history and badge
        env:
          TRAFFIC_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
        run: python scripts/update_clone_badge.py

      - name: Commit updated metrics
        run: |
          if git diff --quiet -- metrics/clone_history.json fig/clone-count.svg; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add metrics/clone_history.json fig/clone-count.svg
          git commit -m "Update clone traffic badge"
          git push
